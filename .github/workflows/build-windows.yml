name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconfirm --name kube-sec --add-data "src/web/templates;templates" --add-data "src/web/static;static" --add-data "public;public" src/main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kube-sec-windows-exe
        path: dist/kube-sec.exe

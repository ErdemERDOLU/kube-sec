repos:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gitleaks — Secret / credential taraması
  #
  # Her git commit öncesinde otomatik olarak çalışır. Staged değişikliklerde
  # bilinen secret pattern'ları (API key, token, private key, parola vb.)
  # bulunursa commit reddedilir.
  #
  # Kurulum (geliştirici makinasında tek seferlik):
  #   pip install pre-commit && pre-commit install
  #
  # Manuel tetikleme (tüm tracked dosyalar):
  #   pre-commit run gitleaks --all-files
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
